<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquAlert - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="dashboard-container">
        <div class="navbar">
            <span class="logo">AquAlert Dashboard</span>
            <button class="logout-btn" onclick="triggerLogout()">Logout</button>
        </div>
        
        <div class="user-email" id="userDisplay">Loading profile...</div>
        <h3>Water Sensor Reading</h3>
        <div class="water-value" id="levelDisplay">--</div>
        <div class="badge safe" id="statusBadge">CONNECTING...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://tuzpazwkcmhmjpbzongj.supabase.co";
        const SUPABASE_KEY = "sb_publishable_n0WvrKIGtpzxopGbY3vcjQ_6ljoAm49";
        const BLYNK_TOKEN  = "gHS7cRliApxnJJm6q-VZWic4VTBc4h3J";
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let trackingInterval;

        window.onload = async () => {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = "./login.html";
            } else {
                document.getElementById('userDisplay').innerText = `Logged in as: ${user.email}`;
                startLiveStream();
            }
        };

        function startLiveStream() {
            const v0Url = `https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&v0`;
            const v1Url = `https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&v1`;

            async function pullData() {
                try {
                    const resV0 = await fetch(v0Url);
                    const val = await resV0.text();
                    document.getElementById('levelDisplay').innerText = val;

                    const resV1 = await fetch(v1Url);
                    const statusText = await resV1.text();
                    
                    const badge = document.getElementById('statusBadge');
                    badge.innerText = statusText;
                    badge.className = "badge";
                    
                    if (statusText.includes("SAFE")) badge.classList.add('safe');
                    else if (statusText.includes("CAUTION")) badge.classList.add('caution');
                    else if (statusText.includes("DANGER")) badge.classList.add('danger');
                } catch(err) {
                    console.error("Stream connection dropped", err);
                }
            }
            pullData();
            trackingInterval = setInterval(pullData, 2000);
        }

        async function triggerLogout() {
            await sb.auth.signOut();
            clearInterval(trackingInterval);
            window.location.href = "./login.html";
        }
    </script>
</body>
</html>
