<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeFlood - Advanced Monitoring System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .hidden { display: none !important; }
        
        /* Auth Card Layout */
        .auth-card, .dashboard-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .dashboard-card { max-width: 600px; }
        
        h2 { margin-bottom: 24px; color: var(--text); }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            font-size: 16px;
        }
        button {
            width: 96%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .toggle-link {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
        }
        .toggle-link span { color: var(--accent); }

        /* Dashboard View */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #475569; padding-bottom: 15px; }
        .logout-btn { width: auto; background: #ef4444; color: white; padding: 6px 12px; margin: 0; font-size: 14px;}
        .data-display { font-size: 72px; font-weight: bold; margin: 30px 0; color: var(--accent); }
        
        .badge {
            font-size: 22px;
            padding: 10px 40px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
        }
        .safe { background: #22c55e; color: white; }
        .caution { background: #eab308; color: #0f172a; }
        .danger { background: #ef4444; color: white; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="auth-card" id="authScreen">
        <h2 id="authTitle">Log In to SafeFlood</h2>
        <input type="email" id="email" placeholder="Enter your email">
        <input type="password" id="password" placeholder="Enter password">
        <button id="authBtn" onclick="handleAuth()">Sign In</button>
        <div class="toggle-link" id="toggleAuth" onclick="toggleAuthMode()">
            Don't have an account? <span>Sign Up</span>
        </div>
    </div>

    <div class="dashboard-card hidden" id="dashboardScreen">
        <div class="header">
            <span id="userGreeting">Welcome!</span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
        
        <h3>🌊 Current Flood Risk Status</h3>
        <div class="data-display" id="waterLevel">--</div>
        <div class="badge safe" id="statusBadge">LOADING...</div>
    </div>

    <script>
        // --- CONFIGURATION KEYS ---
        const SUPABASE_URL = "https://tuzpazwkcmhmjpbzongj.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_n0WvrKIGtpzxopGbY3vcjQ_6ljoAm49";
        const BLYNK_TOKEN  = "gHS7cRliApxnJJm6q-VZWic4VTBc4h3J";

        // Initialize Supabase Client
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let isSignUpMode = false;
        let dataInterval;

        // Toggle interface elements between Login and Sign Up layout
        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authTitle').innerText = isSignUpMode ? "Create an Account" : "Log In to SafeFlood";
            document.getElementById('authBtn').innerText = isSignUpMode ? "Sign Up" : "Sign In";
            document.getElementById('toggleAuth').innerHTML = isSignUpMode ? "Already have an account? <span>Log In</span>" : "Don't have an account? <span>Sign Up</span>";
        }

        // Handle Form Submission (Sign in or Sign up)
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please fill out all fields.");

            if (isSignUpMode) {
                // Register a new user
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) alert(error.message);
                else alert("Registration successful! Please check your email for a confirmation link.");
            } else {
                // Log an existing user in
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else showDashboard(data.user);
            }
        }

        // Handle Logout
        async function handleLogout() {
            await supabase.auth.signOut();
            clearInterval(dataInterval);
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
        }

        // Show Dashboard View and trigger data streams
        function showDashboard(user) {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('userGreeting').innerText = `User: ${user.email}`;
            
            // Fetch live data from Blynk every 2 seconds safely
            startLiveMonitoring();
        }

        function startLiveMonitoring() {
            const urlV0 = `https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&v0`;
            const urlV1 = `https://blynk.cloud/external/api/get?token=${BLYNK_TOKEN}&v1`;

            async function updateData() {
                try {
                    const resV0 = await fetch(urlV0);
                    const level = await resV0.text();
                    document.getElementById('waterLevel').innerText = level;

                    const resV1 = await fetch(urlV1);
                    const status = await resV1.text();
                    
                    const badge = document.getElementById('statusBadge');
                    badge.innerText = status;
                    badge.className = "badge"; // reset classes
                    
                    if (status.includes("SAFE")) badge.classList.add('safe');
                    else if (status.includes("CAUTION")) badge.classList.add('caution');
                    else if (status.includes("DANGER")) badge.classList.add('danger');

                } catch (e) {
                    console.log("Error linking stream:", e);
                }
            }

            updateData();
            dataInterval = setInterval(updateData, 2000);
        }

        // Session Check: Auto-login user if a browser session exists
        window.onload = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) showDashboard(user);
        };
    </script>
</body>
</html>
