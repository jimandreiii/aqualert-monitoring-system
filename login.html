<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquAlert - Log In</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="card">
        <h1>AquAlert</h1>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Sign In</button>
        <div class="link">New to AquAlert? <a href="signup.html">Sign Up</a></div>
    </div>

    <script>
        const SUPABASE_URL = "https://tuzpazwkcmhmjpbzongj.supabase.co/rest/v1/";
        const SUPABASE_KEY = "sb_publishable_n0WvrKIGtpzxopGbY3vcjQ_6ljoAm49";
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) {
                alert(error.message);
            } else {
                window.location.href = "dashboard.html";
            }
        }

        window.onload = async () => {
            const { data: { user } } = await sb.auth.getUser();
            if (user) window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>
